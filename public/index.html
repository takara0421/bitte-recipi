<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bitte レシピ写真</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brown: #c17a3c; --brown2: #a05f28;
    --bg: #fdf6ef; --card: #ffffff;
    --border: #e8ddd0; --text: #3a2e24; --muted: #9a8878;
    --radius: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic Pro', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }

  /* サイドバー */
  aside {
    width: 220px; min-width: 220px;
    background: var(--card); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    background: var(--brown); color: #fff;
    padding: 14px 16px; font-size: 14px; font-weight: 700;
  }
  .sidebar-header small { display: block; font-size: 11px; font-weight: 400; opacity: .8; margin-top: 2px; }
  .recipe-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .recipe-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; cursor: pointer; font-size: 13px;
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .recipe-item:hover { background: #faf0e6; }
  .recipe-item.active { background: #fdf0e0; border-left-color: var(--brown); font-weight: 600; }
  .badge {
    background: var(--brown); color: #fff; border-radius: 999px;
    font-size: 10px; padding: 1px 7px; min-width: 22px; text-align: center;
  }
  .badge.empty { background: var(--border); color: var(--muted); }

  /* メイン */
  main { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 18px; }
  .main-title { font-size: 20px; font-weight: 700; color: var(--brown); }

  /* アップロードエリア */
  .upload-area {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 24px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
    background: var(--card); position: relative;
  }
  .upload-area:hover, .upload-area.drag { border-color: var(--brown); background: #fdf0e0; }
  .upload-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-text { font-size: 13px; color: var(--muted); }
  .upload-text strong { color: var(--brown); }
  .upload-status { font-size: 12px; color: var(--muted); min-height: 18px; }

  /* グリッド */
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
  .photo-card {
    border-radius: var(--radius); overflow: hidden;
    background: var(--card); border: 1px solid var(--border);
    position: relative; aspect-ratio: 1; cursor: pointer;
  }
  .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .2s; }
  .photo-card:hover img { transform: scale(1.04); }
  .del-btn {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,.55); color: #fff;
    border: none; border-radius: 50%; width: 26px; height: 26px;
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .18s;
  }
  .photo-card:hover .del-btn { opacity: 1; }
  .empty-msg { color: var(--muted); font-size: 13px; padding: 8px 0; }

  /* ライトボックス */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.85); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: var(--radius); }
  .lb-close {
    position: absolute; top: 14px; right: 18px;
    color: #fff; font-size: 30px; cursor: pointer; background: none; border: none;
  }

  .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    🍞 bitte レシピ写真
    <small>レシピを選んで写真を登録</small>
  </div>
  <div class="recipe-list" id="recipeList">
    <div style="padding:14px;color:var(--muted);font-size:13px">読み込み中...</div>
  </div>
</aside>

<main id="main">
  <div class="placeholder">← レシピを選択してください</div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">×</button>
  <img id="lbImg" src="" alt="">
</div>

<script>
const API = '';
let recipes = [];
let currentSlug = null;

async function init() {
  try {
    const res = await fetch(`${API}/api/recipes`);
    if (!res.ok) throw new Error(`API ${res.status}`);
    recipes = await res.json();
    renderSidebar();
  } catch (e) {
    document.getElementById('recipeList').innerHTML =
      `<div style="padding:14px;color:#e05a5a;font-size:12px">読み込みエラー: ${e.message}</div>`;
  }
}

function renderSidebar() {
  const list = document.getElementById('recipeList');
  list.innerHTML = recipes.map(r => `
    <div class="recipe-item${r.slug === currentSlug ? ' active' : ''}"
         data-slug="${r.slug}" data-name="${esc(r.name)}">
      <span>${esc(r.name)}</span>
      <span class="badge${r.photo_count === 0 ? ' empty' : ''}">${r.photo_count}</span>
    </div>
  `).join('');
  list.querySelectorAll('.recipe-item').forEach(el =>
    el.addEventListener('click', () => selectRecipe(el.dataset.slug, el.dataset.name))
  );
}

async function selectRecipe(slug, name) {
  currentSlug = slug;
  renderSidebar();
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="main-title">${esc(name)}</div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div class="upload-icon">📷</div>
      <div class="upload-text"><strong>クリックまたはドロップ</strong>して写真を追加<br>JPG / PNG / WebP / HEIC 対応</div>
    </div>
    <div class="upload-status" id="uploadStatus"></div>
    <div class="photo-grid" id="photoGrid"><div class="empty-msg">読み込み中...</div></div>
  `;
  bindUpload(slug);
  await loadPhotos(slug);
}

function bindUpload(slug) {
  const area = document.getElementById('uploadArea');
  const input = document.getElementById('fileInput');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag'));
  area.addEventListener('drop', async e => { e.preventDefault(); area.classList.remove('drag'); await uploadFiles(slug, e.dataTransfer.files); });
  input.addEventListener('change', async () => { await uploadFiles(slug, input.files); input.value = ''; });
}

async function uploadFiles(slug, files) {
  if (!files || files.length === 0) return;
  const status = document.getElementById('uploadStatus');
  let done = 0;
  for (const file of files) {
    status.textContent = `アップロード中... (${done}/${files.length}) ${file.name}`;
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(`${API}/api/photos/${slug}`, { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      status.textContent = `エラー: ${err.detail || res.status}`;
      return;
    }
    const data = await res.json();
    done++;
    appendPhoto(data.file_id, data.filename, slug);
  }
  status.textContent = `${done}枚 追加しました`;
  setTimeout(() => { status.textContent = ''; }, 2500);
  const rec = recipes.find(r => r.slug === slug);
  if (rec) { rec.photo_count += done; renderSidebar(); }
  const empty = document.querySelector('.photo-grid .empty-msg');
  if (empty) empty.remove();
}

async function loadPhotos(slug) {
  const grid = document.getElementById('photoGrid');
  const res = await fetch(`${API}/api/photos/${slug}`);
  const photos = await res.json();
  if (!photos.length) {
    grid.innerHTML = '<div class="empty-msg">写真がまだ登録されていません</div>';
    return;
  }
  grid.innerHTML = '';
  photos.forEach(p => appendPhoto(p.file_id, p.filename, slug));
}

function appendPhoto(fileId, filename, slug) {
  const grid = document.getElementById('photoGrid');
  const imgUrl = `${API}/api/photo/${fileId}`;
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.dataset.fileId = fileId;
  card.innerHTML = `<img src="${imgUrl}" alt="${esc(filename)}" loading="lazy"><button class="del-btn" title="削除">✕</button>`;
  card.querySelector('img').addEventListener('click', () => openLightbox(imgUrl));
  card.querySelector('.del-btn').addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`"${filename}" を削除しますか？`)) return;
    const res = await fetch(`${API}/api/photos/${fileId}`, { method: 'DELETE' });
    if (res.ok) {
      card.remove();
      const rec = recipes.find(r => r.slug === slug);
      if (rec && rec.photo_count > 0) { rec.photo_count--; renderSidebar(); }
      if (!document.querySelectorAll('.photo-card').length)
        grid.innerHTML = '<div class="empty-msg">写真がまだ登録されていません</div>';
    }
  });
  grid.appendChild(card);
}

function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
document.getElementById('lbClose').addEventListener('click', () =>
  document.getElementById('lightbox').classList.remove('show'));
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
